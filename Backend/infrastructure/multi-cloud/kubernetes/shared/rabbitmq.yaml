apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellara-rabbitmq
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-rabbitmq
    app.kubernetes.io/component: messaging
    app.kubernetes.io/part-of: stellara
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stellara-rabbitmq
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stellara-rabbitmq
        app.kubernetes.io/component: messaging
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
        env:
        - name: RABBITMQ_DEFAULT_USER
          value: "stellara"
        - name: RABBITMQ_DEFAULT_PASS
          valueFrom:
            secretKeyRef:
              name: stellara-backend-secrets
              key: RABBITMQ_PASSWORD
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - ping
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - ping
          initialDelaySeconds: 20
          periodSeconds: 10
        volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq

---
apiVersion: v1
kind: Service
metadata:
  name: stellara-rabbitmq
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-rabbitmq
    app.kubernetes.io/component: messaging
spec:
  selector:
    app.kubernetes.io/name: stellara-rabbitmq
  ports:
  - port: 5672
    targetPort: 5672
    name: amqp
  - port: 15672
    targetPort: 15672
    name: management