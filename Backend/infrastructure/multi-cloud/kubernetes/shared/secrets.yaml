apiVersion: v1
kind: Secret
metadata:
  name: stellara-backend-secrets
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-backend
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Base64 encoded values - these should be replaced with actual secrets
  JWT_SECRET: "REPLACE_WITH_BASE64_ENCODED_JWT_SECRET"
  DATABASE_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD"
  REDIS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_REDIS_PASSWORD"
  RABBITMQ_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_RABBITMQ_PASSWORD"
  STELLAR_RPC_URL: "REPLACE_WITH_BASE64_ENCODED_RPC_URL"
  PROJECT_LAUNCH_CONTRACT_ID: "REPLACE_WITH_BASE64_ENCODED_CONTRACT_ID"
  ESCROW_CONTRACT_ID: "REPLACE_WITH_BASE64_ENCODED_ESCROW_ID"
  # AWS specific secrets
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_BASE64_ENCODED_AWS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_BASE64_ENCODED_AWS_SECRET"
  # Azure specific secrets
  AZURE_CLIENT_ID: "REPLACE_WITH_BASE64_ENCODED_AZURE_CLIENT_ID"
  AZURE_CLIENT_SECRET: "REPLACE_WITH_BASE64_ENCODED_AZURE_SECRET"
  AZURE_TENANT_ID: "REPLACE_WITH_BASE64_ENCODED_AZURE_TENANT"
  # GCP specific secrets
  GCP_SERVICE_ACCOUNT_KEY: "REPLACE_WITH_BASE64_ENCODED_GCP_KEY"