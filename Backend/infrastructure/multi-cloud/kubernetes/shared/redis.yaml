apiVersion: apps/v1
kind: Deployment
metadata:
  name: stellara-redis
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: stellara
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stellara-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stellara-redis
        app.kubernetes.io/component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stellara-backend-secrets
              key: REDIS_PASSWORD
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        - --maxmemory
        - 512mb
        - --maxmemory-policy
        - allkeys-lru
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - -a
            - $(REDIS_PASSWORD)
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: stellara-redis-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stellara-redis-pvc
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-redis
    app.kubernetes.io/component: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard  # Cloud-specific storage class

---
apiVersion: v1
kind: Service
metadata:
  name: stellara-redis
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-redis
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: stellara-redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis