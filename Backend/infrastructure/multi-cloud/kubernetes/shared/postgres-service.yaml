apiVersion: v1
kind: Service
metadata:
  name: stellara-postgres
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: stellara-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  clusterIP: None  # Headless service for StatefulSet