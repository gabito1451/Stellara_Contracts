apiVersion: v1
kind: ConfigMap
metadata:
  name: stellara-backend-config
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: stellara-backend
    app.kubernetes.io/component: config
data:
  NODE_ENV: "production"
  PORT: "3000"
  API_PREFIX: "api/v1"
  DATABASE_PORT: "5432"
  REDIS_PORT: "6379"
  JWT_EXPIRATION: "900"
  JWT_REFRESH_EXPIRATION: "7d"
  STELLAR_NETWORK: "public"
  STELLAR_NETWORK_PASSPHRASE: "Public Global Stellar Network ; September 2015"
  INDEXER_POLL_INTERVAL_MS: "5000"
  INDEXER_REORG_DEPTH_THRESHOLD: "5"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "stellara"
  # Database configuration will be set via environment variables
  # Redis configuration will be set via environment variables
  # RabbitMQ configuration will be set via environment variables
  # JWT secrets will be set via secrets
  # Stellar configuration will be set via secrets