# Multi-Cloud Monitoring Setup
# Prometheus and Grafana configuration for cross-cloud observability

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # Stellara Backend Application
      - job_name: 'stellara-backend'
        static_configs:
          - targets: ['stellara-backend:3000']
        metrics_path: '/api/v1/metrics'
        scrape_interval: 10s

      # PostgreSQL Database
      - job_name: 'stellara-postgres'
        static_configs:
          - targets: ['stellara-postgres:5432']
        scrape_interval: 30s

      # Redis Cache
      - job_name: 'stellara-redis'
        static_configs:
          - targets: ['stellara-redis:6379']

      # RabbitMQ Message Queue
      - job_name: 'stellara-rabbitmq'
        static_configs:
          - targets: ['stellara-rabbitmq:15692']

      # Cross-Cloud Health Checks
      - job_name: 'cross-cloud-health'
        static_configs:
          - targets:
            - 'api-aws.stellara.internal:80'
            - 'api-azure.stellara.internal:80'
            - 'api-gcp.stellara.internal:80'
        metrics_path: '/api/v1/health'
        scrape_interval: 30s
        scrape_timeout: 10s

      # Kubernetes metrics
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: stellara-backend
data:
  alerts.yml: |
    groups:
      - name: stellara-backend
        rules:
          # Application Health Alerts
          - alert: StellaraBackendDown
            expr: up{job="stellara-backend"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Stellara Backend is down"
              description: "Stellara Backend has been down for more than 5 minutes."

          - alert: StellaraBackendHighErrorRate
            expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate in Stellara Backend"
              description: "Error rate is {{ $value }}% which is above 5%."

          # Database Alerts
          - alert: PostgreSQLDown
            expr: up{job="stellara-postgres"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL has been down for more than 5 minutes."

          - alert: PostgreSQLHighConnections
            expr: pg_stat_activity_count > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High PostgreSQL connection count"
              description: "PostgreSQL has {{ $value }} active connections."

          # Cross-Cloud Alerts
          - alert: CrossCloudRegionDown
            expr: up{job="cross-cloud-health"} == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Cross-cloud region is down"
              description: "Region {{ $labels.instance }} has been unreachable for 10 minutes."

          # Cost Alerts
          - alert: HighCloudCosts
            expr: stellara_cloud_cost_total > 5000
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "High cloud costs detected"
              description: "Total cloud costs have exceeded $5000 in the last hour."

          # Performance Alerts
          - alert: HighResponseTime
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High response time"
              description: "95th percentile response time is {{ $value }}s."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/component: monitoring
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
          name: http
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: prometheus-data
          mountPath: /prometheus
        resources:
          requests:
            memory: "400Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-rules
      - name: prometheus-data
        persistentVolumeClaim:
          claimName: prometheus-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
  - port: 9090
    targetPort: 9090
    name: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/component: monitoring
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stellara-backend-secrets
              key: GRAFANA_ADMIN_PASSWORD
        volumeMounts:
        - name: grafana-data
          mountPath: /var/lib/grafana
        - name: grafana-config
          mountPath: /etc/grafana/provisioning
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
      volumes:
      - name: grafana-data
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-config
        configMap:
          name: grafana-provisioning

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: stellara-backend
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP